common:
    lid_topic: "/velodyne_points"
    imu_topic: "/robot/imu/data"
    time_sync_en: false
    time_offset_lidar_to_imu: 0.0

preprocess:
    lidar_type: 2                # 2 = Velodyne-type mechanical LiDAR
    scan_line: 16                # RS-LiDAR-16 (via front_laser)
    scan_rate: 10                # 10 Hz
    timestamp_unit: 0            # 0 = seconds (our republisher outputs float32 seconds)
    blind: 2

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    180
    det_range:     100.0
    extrinsic_est_en:  false
    extrinsic_T: [0, 0, 0]
    extrinsic_R: [1, 0, 0,
                  0, 1, 0,
                  0, 0, 1]

publish:
    path_en:  true
    scan_publish_en:  true
    dense_publish_en: true
    scan_bodyframe_pub_en: true

pcd_save:
    pcd_save_en: true
    interval: -1
