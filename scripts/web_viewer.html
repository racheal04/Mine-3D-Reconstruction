<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FAST-LIO2 矿道实时建模</title>
<style>
  body { margin:0; overflow:hidden; background:#0a0a14; font-family:monospace; }
  #info { position:absolute; top:10px; left:10px; color:#0f0; font-size:13px;
          background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:4px; z-index:10; }
  #status { position:absolute; bottom:10px; left:10px; color:#666; font-size:10px;
            background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:3px; z-index:10; }
</style>
</head>
<body>
<div id="info">等待数据...</div>
<div id="status">轮询 /tmp/meshes/ 每3秒</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
               "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);
scene.fog = new THREE.Fog(0x0a0a14, 60, 300);

const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 500);
camera.position.set(20, 15, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0);
controls.update();

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 2.5));
const sun = new THREE.DirectionalLight(0xffeedd, 5);
sun.position.set(30, 40, 20);
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x6688cc, 2).translateX(-20));
scene.add(new THREE.HemisphereLight(0x8888ff, 0x443322, 1));

// Grid
scene.add(new THREE.GridHelper(200, 100, 0x333344, 0x1a1a2a));

// Data
let pointCloud = null, currentMesh = null;
let lastMesh = '', lastCloud = '';
const MESH_DIR = '/';
const FIX = new THREE.Matrix4().makeRotationX(-Math.PI/2); // Z-up → Y-up

// Height → color
function hColor(z, zMin, zMax) {
  const t = zMax > zMin ? Math.max(0, Math.min(1, (z - zMin) / (zMax - zMin))) : 0.5;
  if (t < 0.25) return [0, t*4, 1];
  if (t < 0.5)  return [0, 1, 2-t*4];
  if (t < 0.75) return [t*4-2, 1, 0];
  return [1, 2-t*4, 0];
}

function loadCloud(name) {
  new PLYLoader().load(MESH_DIR + name, g => {
    if (pointCloud) scene.remove(pointCloud);
    g.computeVertexNormals();
    const z = g.attributes.position.array;
    let zMin = Infinity, zMax = -Infinity;
    for (let i = 2; i < z.length; i += 3) {
      if (z[i] < zMin) zMin = z[i]; if (z[i] > zMax) zMax = z[i];
    }
    if (!g.attributes.color) {
      const c = new Float32Array(g.attributes.position.count * 3);
      for (let i = 0; i < g.attributes.position.count; i++) {
        const [r, gv, b] = hColor(z[i*3+2], zMin, zMax);
        c[i*3]=r; c[i*3+1]=gv; c[i*3+2]=b;
      }
      g.setAttribute('color', new THREE.BufferAttribute(c, 3));
    }
    const mat = new THREE.PointsMaterial({size:0.12, vertexColors:true, sizeAttenuation:true});
    pointCloud = new THREE.Points(g, mat);
    pointCloud.applyMatrix4(FIX);
    scene.add(pointCloud);
    lastCloud = name;
    updateInfo();
  });
}

function loadMesh(name) {
  new PLYLoader().load(MESH_DIR + name, g => {
    if (currentMesh) scene.remove(currentMesh);
    g.computeVertexNormals();
    const z = g.attributes.position.array;
    let zMin = Infinity, zMax = -Infinity;
    for (let i = 2; i < z.length; i += 3) {
      if (z[i] < zMin) zMin = z[i]; if (z[i] > zMax) zMax = z[i];
    }
    if (!g.attributes.color) {
      const c = new Float32Array(g.attributes.position.count * 3);
      for (let i = 0; i < g.attributes.position.count; i++) {
        const [r, gv, b] = hColor(z[i*3+2], zMin, zMax);
        c[i*3]=r; c[i*3+1]=gv; c[i*3+2]=b;
      }
      g.setAttribute('color', new THREE.BufferAttribute(c, 3));
    }
    const mat = new THREE.MeshPhongMaterial({vertexColors:true, side:THREE.DoubleSide, shininess:5});
    currentMesh = new THREE.Mesh(g, mat);
    currentMesh.applyMatrix4(FIX);
    scene.add(currentMesh);
    lastMesh = name;
    updateInfo();
  });
}

function updateInfo() {
  let h = '';
  if (currentMesh) {
    const v = currentMesh.geometry.attributes.position.count;
    const f = currentMesh.geometry.index ? currentMesh.geometry.index.count/3 : v/3;
    h += `网格: ${lastMesh} | ${v.toLocaleString()}顶点 | ${Math.round(f).toLocaleString()}面`;
  }
  if (pointCloud) {
    h += (h?'<br>':'') + `点云: ${lastCloud} | ${pointCloud.geometry.attributes.position.count.toLocaleString()}点`;
  }
  document.getElementById('info').innerHTML = h || '等待数据...';
}

// Poll
async function findLatest(prefix) {
  try {
    const r = await fetch(MESH_DIR);
    if (!r.ok) return null;
    const t = await r.text();
    const m = t.match(new RegExp(prefix + '_\\d+\\.ply', 'g'));
    return m ? m.sort().pop() : null;
  } catch(e) { return null; }
}

setInterval(async () => {
  const c = await findLatest('cloud');
  if (c && c !== lastCloud) { loadCloud(c); document.getElementById('status').textContent = '更新: ' + c; }
  const m = await findLatest('mesh');
  if (m && m !== lastMesh) { loadMesh(m); document.getElementById('status').textContent = '更新: ' + m; }
}, 3000);

(async () => {
  const c = await findLatest('cloud'); if (c) loadCloud(c);
  const m = await findLatest('mesh'); if (m) loadMesh(m);
})();

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
